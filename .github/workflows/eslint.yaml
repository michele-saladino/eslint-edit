name: ESLint changed lines

on:
  pull_request:
  push:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm tsc

      - name: Run check and fail if output > 0
        run: |
          # Tee so the ::error:: annotation lines still reach the runner's
          # stdout (GitHub parses them from there), while we capture the
          # trailing count to decide pass/fail.
          node dist | tee output.log
          count=$(tail -n 1 output.log)
          echo "Number of new problems: $count"
          if [ "$count" -gt 0 ]; then
            echo "::error::Found $count new lint problem(s) on changed lines"
            exit 1
          fi
